<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OldRoast.com</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>OldRoast.com</h1>
    <p class="subtitle">A random roast for the young at heart.</p>

    <section class="card">
      <p class="label">Current phrase</p>
      <blockquote id="phraseDisplay">Loading phrase...</blockquote>
      <div class="actions">
        <button type="button" id="speakButton">Read it aloud</button>
        <button type="button" id="nextButton">Pick another</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Phrase Catalog</h2>
      <p class="subtitle">Browse sayings by category.</p>
      <div id="phrasesList"></div>
    </section>

    <!-- Site info removed for production -->
  </main>

  <script src="script.js"></script>

</body>
</html>
