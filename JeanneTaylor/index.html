<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jean E. Taylor's Roasts</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="container">
    <h1>Jeanne Taylor's Roasts</h1>
    <p class="subtitle">A custom roast collection.</p>

    <section class="card">
      <p class="label">Current phrase</p>
      <blockquote id="phraseDisplay">Loading phrase...</blockquote>
      <div class="actions">
        <button type="button" id="speakButton">Read it aloud</button>
        <button type="button" id="nextButton">Pick another</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="../script.js"></script>
</body>
</html>
